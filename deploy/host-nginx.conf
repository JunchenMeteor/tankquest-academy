server {
    listen 80;
    listen [::]:80;
    server_name tankquest.jcmeteor.com tq-pre.jcmeteor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tankquest.jcmeteor.com;

    ssl_certificate /etc/nginx/ssl/jcmeteor.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/jcmeteor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tq-pre.jcmeteor.com;

    ssl_certificate /etc/nginx/ssl/jcmeteor.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/jcmeteor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3301;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
