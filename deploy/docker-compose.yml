services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tankquest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: tankquest
    volumes:
      - ${POSTGRES_DATA_PATH:?POSTGRES_DATA_PATH is required}:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tankquest -d tankquest']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    init: true
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - 127.0.0.1:${HOST_PORT:?HOST_PORT is required}:8080
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '-O',
          '/dev/null',
          'http://127.0.0.1:8080/api/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 96m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
