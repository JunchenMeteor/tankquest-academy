name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        env:
          DATABASE_URL: postgresql://tankquest:tankquest@localhost:5432/tankquest
        run: npm run format:check && npm run lint && npm run typecheck && npm test && npm run build

      - name: Package artifacts
        run: |
          tar -czf "tankquest-web-${GITHUB_REF_NAME}.tar.gz" -C apps/web dist
          tar -czf "tankquest-api-${GITHUB_REF_NAME}.tar.gz" apps/api/dist apps/api/prisma packages/shared/dist package.json package-lock.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes "tankquest-web-${GITHUB_REF_NAME}.tar.gz" "tankquest-api-${GITHUB_REF_NAME}.tar.gz"
