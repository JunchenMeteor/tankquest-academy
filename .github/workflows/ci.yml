name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: tankquest
          POSTGRES_PASSWORD: tankquest
          POSTGRES_USER: tankquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tankquest -d tankquest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tankquest:tankquest@localhost:5432/tankquest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml

      - name: Install dependencies
        run: npm ci

      - name: Install AI service dependencies
        run: python -m pip install -e './services/ai[dev]'

      - name: Format
        run: npm run format:check

      - name: Validate database schema
        run: npm run db:validate

      - name: Validate visual assets
        run: npm run assets:verify

      - name: Validate PWA policy
        run: npm run pwa:verify

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply database contract
        run: npm run db:migrate && npm run db:seed

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end test
        env:
          DEBUG: pw:webserver
        run: npm run test:e2e
