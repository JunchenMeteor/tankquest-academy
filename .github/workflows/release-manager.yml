name: TankQuest Release Manager

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  checks: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.1
        required: true
        type: string
      action:
        description: Release action
        required: true
        default: full
        type: choice
        options:
          - full
          - prepare
          - promote
          - verify

concurrency:
  group: release-manager
  cancel-in-progress: false

jobs:
  release:
    name: TankQuest / Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_MANAGER_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run TankQuest release manager
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MANAGER_TOKEN || github.token }}
        run: node scripts/release-manager.mjs "${{ inputs.action }}" --version "${{ inputs.version }}"
